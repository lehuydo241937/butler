services:
  redis:
    image: redis:7-alpine
    container_name: butler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:latest
    container_name: butler-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    container_name: butler-api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    command: uvicorn api:app --host 0.0.0.0 --port 8000

volumes:
  redis_data:
  qdrant_data:
